<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your GitHub Repos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #f0f6fc; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    #logout { background: none; border: 1px solid #30363d; color: #8b949e; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    #logout:hover { border-color: #8b949e; color: #c9d1d9; }
    #repo-list { display: grid; gap: 1rem; }
    .repo-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.2rem 1.4rem; display: flex; justify-content: space-between; align-items: flex-start; }
    .repo-card:hover { border-color: #58a6ff; }
    .repo-name a { font-size: 1rem; font-weight: 600; color: #58a6ff; text-decoration: none; }
    .repo-name a:hover { text-decoration: underline; }
    .repo-desc { font-size: 0.85rem; color: #8b949e; margin-top: 4px; }
    .repo-meta { display: flex; gap: 1rem; font-size: 0.8rem; color: #8b949e; margin-top: 10px; flex-wrap: wrap; }
    .badge { background: #21262d; border: 1px solid #30363d; border-radius: 20px; padding: 2px 8px; font-size: 0.75rem; }
    .badge.private { color: #f0883e; border-color: #f0883e33; }
    .badge.public { color: #3fb950; border-color: #3fb95033; }
    .lang-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #f1e05a; margin-right: 4px; }
    #status { color: #8b949e; font-size: 0.9rem; padding: 1rem 0; }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>📦 Your GitHub Repositories</h1>
    <button id="logout" onclick="window.location='/logout'">Log out</button>
  </div>
  <div id="status">Loading repositories...</div>
  <div id="repo-list"></div>

  <script>
    const langColors = {
      JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5',
      HTML: '#e34c26', CSS: '#563d7c', Java: '#b07219', Go: '#00ADD8',
      Rust: '#dea584', C: '#555555', 'C++': '#f34b7d', Ruby: '#701516',
      Swift: '#F05138', Kotlin: '#A97BFF', Shell: '#89e051', null: '#8b949e'
    };

    async function loadRepos() {
      const status = document.getElementById('status');
      const list = document.getElementById('repo-list');

      try {
        const res = await fetch('/api/repos', { credentials: 'include' });
        if (res.status === 401) {
          status.innerHTML = '<a href="/" style="color:#58a6ff">Please log in to view your repos.</a>';
          return;
        }
        const repos = await res.json();
        status.textContent = `${repos.length} repositor${repos.length === 1 ? 'y' : 'ies'}`;

        list.innerHTML = repos.map(repo => `
          <div class="repo-card">
            <div>
              <div class="repo-name">
                <a href="${repo.url}" target="_blank">${repo.name}</a>
                <span class="badge ${repo.private ? 'private' : 'public'}">${repo.private ? 'Private' : 'Public'}</span>
              </div>
              ${repo.description ? `<div class="repo-desc">${repo.description}</div>` : ''}
              <div class="repo-meta">
                ${repo.language ? `<span><span class="lang-dot" style="background:${langColors[repo.language] || '#8b949e'}"></span>${repo.language}</span>` : ''}
                ${repo.stars > 0 ? `<span>⭐ ${repo.stars}</span>` : ''}
                <span>Updated ${timeAgo(repo.updated_at)}</span>
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        status.textContent = 'Failed to load repositories.';
      }
    }

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr);
      const days = Math.floor(diff / 86400000);
      if (days === 0) return 'today';
      if (days === 1) return 'yesterday';
      if (days < 30) return `${days} days ago`;
      const months = Math.floor(days / 30);
      if (months < 12) return `${months} month${months > 1 ? 's' : ''} ago`;
      return `${Math.floor(months / 12)} year${Math.floor(months / 12) > 1 ? 's' : ''} ago`;
    }

    loadRepos();
  </script>
</body>
</html>
